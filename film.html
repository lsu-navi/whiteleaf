    <div class="film-modal" id="filmModal" aria-hidden="true">

            <div class="film-modal-video">
                <iframe id="filmModalIframe" src="about:blank" title="YouTube 영상" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <script>
        (function () {
            var modal = document.getElementById("filmModal");
            var iframe = document.getElementById("filmModalIframe");
            var closeBtn = modal && modal.querySelector(".film-modal-close");
            var backdrop = modal && modal.querySelector(".film-modal-backdrop");

            function openModal(videoId) {
                if (!modal || !iframe || !videoId) return;
                iframe.src = "https://www.youtube-nocookie.com/embed/" + videoId + "?autoplay=1&rel=0";
                modal.setAttribute("aria-hidden", "false");
                document.body.style.overflow = "hidden";
            }

            function closeModal() {
                if (!modal || !iframe) return;
                iframe.src = "about:blank";
                modal.setAttribute("aria-hidden", "true");
                document.body.style.overflow = "";
            }

            document.addEventListener("click", function (e) {
                var item = e.target.closest(".film-item[data-youtube-id]");
                if (item) {
                    e.preventDefault();
                    openModal(item.getAttribute("data-youtube-id"));
                }
                if (e.target === closeBtn || e.target === backdrop) {
                    closeModal();
                }
            });

            document.addEventListener("keydown", function (e) {
                if (e.key === "Escape" && modal && modal.getAttribute("aria-hidden") === "false") {
                    closeModal();
                }
            });
        })();
    </script>
